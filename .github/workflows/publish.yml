name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      # TOKEN BOOTSTRAP (one-time) — first publish authenticates with the NPM_TOKEN
      # repo secret (a Trusted Publisher can't be configured before the package
      # exists). After it lands: add the Trusted Publisher on npmjs.com, revoke the
      # token, and drop the env block so releases ship via OIDC.
      - name: Publish
        run: npx -y npm@latest publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
